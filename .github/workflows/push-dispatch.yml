name: Push Dispatch

on:
  schedule:
    # JST 18:00–22:00 = UTC 09:00–13:00 (no DST in Japan).
    # The dispatch endpoint computes the actual JST hour at request time and
    # selects matching subscription buckets, so a delayed run at HH:05 still
    # targets the HH:00 bucket as long as it lands within the same JST hour.
    - cron: "0 9-13 * * *"
  workflow_dispatch:

concurrency:
  group: push-dispatch
  cancel-in-progress: false

# Workflow-default minimum permission. The dispatch job is purely an outbound
# HTTPS call to our own deployed endpoint, so no elevation is needed.
permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mask Discord webhook URL
        run: echo "::add-mask::$DISCORD_WEBHOOK"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Trigger /api/push/dispatch
        id: dispatch
        env:
          ENDPOINT: ${{ secrets.PUSH_DISPATCH_ENDPOINT }}
          SECRET: ${{ secrets.PUSH_DISPATCH_SECRET }}
        # `--fail-with-body` returns the upstream body on non-2xx so the run
        # log shows the dispatch summary (or error) without leaking secrets.
        # Headers carrying the bearer token never appear in the visible log.
        run: |
          curl -sS --fail-with-body \
            -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Notify Discord on failure
        if: failure() && steps.dispatch.outcome == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"[koto-city] Push dispatch failed. See: $RUN_URL\"}"
