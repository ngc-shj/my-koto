name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Ensure data (offline-safe subset)
        run: npx tsx scripts/ensure-data.ts
        env:
          # Skip network fetches in CI — use committed data/ files only
          ENSURE_DATA_OFFLINE: "1"

      - name: Lint
        run: npx next lint

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx next build
