name: Data Sync

on:
  schedule:
    # Run at 18:00 UTC = 03:00 JST
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: data-sync
  cancel-in-progress: false

# Default permissions for all steps. Individual steps elevate as needed.
# `contents: read` covers checkout / npm install. PR creation is scoped to
# the create-pull-request step alone via permissions: at the step level.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Per-job elevated permissions — only PR creation needs writes.
    # Branch protection on `main` (CODEOWNERS for .github/workflows/** and
    # scripts/**) is the operator-side companion control for S-01.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Mask Discord webhook URL
        run: echo "::add-mask::$DISCORD_WEBHOOK"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      # All third-party actions are pinned to their commit SHA so a tag
      # repoint or namespace takeover cannot inject code into a workflow
      # that has secret access. Versions are tracked in trailing comments
      # so Renovate / Dependabot can update them safely.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check failure flag (same-day deduplication)
        id: check-flag
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .cache/discord-notified
          key: discord-notified-${{ github.run_id }}
          restore-keys: |
            discord-notified-${{ github.ref_name }}-${{ github.run_id }}

      - name: Fetch open data
        id: fetch
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          UA_OVERRIDE: "koto-city-bot/1.0 (+https://example.com/about)"
        run: npx tsx scripts/fetch-opendata.ts

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync open data"
          title: "chore: sync open data (${{ github.run_id }})"
          body: |
            Automated open data sync.

            - AED, Toilet, Gomi, Events, WBGT data updated.
            - Triggered by: ${{ github.event_name }}
            - Run ID: ${{ github.run_id }}
          branch: "data-sync/run-${{ github.run_id }}"
          delete-branch: true
          add-paths: "data/*.json"

      - name: Notify Discord on failure
        if: failure() && steps.fetch.outcome == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        # Fixed body — never interpolates the webhook into a position where
        # debug logs could echo it (S-04). Diagnostics live in the run URL.
        run: |
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"[koto-city] Data sync failed. See: $RUN_URL\"}"
